name: sanctuary_app
description: Your cosy productivity sanctuary.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.2.3
  # Rive for mascot animation — add when you're ready
  # rive: ^0.12.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  # ---------------------------------------------------------------------------
  # DynaPuff font — download from Google Fonts and place in assets/fonts/
  # https://fonts.google.com/specimen/DynaPuff
  # ---------------------------------------------------------------------------
  fonts:
    - family: DynaPuff
      fonts:
        - asset: assets/fonts/DynaPuff-Regular.ttf
          weight: 400
        - asset: assets/fonts/DynaPuff-Medium.ttf
          weight: 500
        - asset: assets/fonts/DynaPuff-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/DynaPuff-Bold.ttf
          weight: 700

  assets:
    - assets/fonts/DynaPuff-Regular.ttf
    - assets/items/          # shop item PNGs — drop <item_id>.png here
    # - assets/rive/mascot.riv   # uncomment when adding Rive mascot
